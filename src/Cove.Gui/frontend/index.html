<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove</title>
  <style>
    :root {
      --bg: #0b1622;
      --panel: #0e1c2e;
      --panel-2: #12233a;
      --border: #1b2c42;
      --fg: #e5e9f0;
      --muted: #7c8aa0;
      --accent: #4cc2d6;
      --accent-dim: #2b6d7a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100vh; overflow: hidden; }
    body {
      display: flex;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
    }
    #sidebar {
      width: 232px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      user-select: none; -webkit-user-select: none;
    }
    body.sidebar-hidden #sidebar { display: none; }
    #brand {
      display: flex; align-items: center; gap: 9px;
      height: 46px; padding: 0 16px;
      font-weight: 650; font-size: 14px; letter-spacing: 0.4px;
      border-bottom: 1px solid var(--border);
    }
    #brand .mark {
      width: 12px; height: 12px; background: var(--accent);
      border-radius: 3px; transform: rotate(45deg);
      box-shadow: 0 0 10px var(--accent-dim);
    }
    .side-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 6px; color: var(--muted);
      font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .side-head .add { cursor: pointer; font-size: 15px; color: var(--muted); padding: 0 5px; border-radius: 5px; }
    .side-head .add:hover { color: var(--fg); background: var(--panel-2); }
    #sessions { overflow-y: auto; flex: 1; padding: 0 8px; }
    .sess {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 9px; margin: 1px 0; border-radius: 7px; cursor: pointer; color: var(--muted);
    }
    .sess:hover { background: var(--panel-2); color: var(--fg); }
    .sess.active { background: var(--panel-2); color: var(--fg); }
    .sess.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent-dim); }
    .sess .dot { width: 7px; height: 7px; border-radius: 50%; background: #3a4a60; flex-shrink: 0; }
    .sess .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sess .n { font-size: 11px; color: var(--muted); }
    .sess .x { opacity: 0; font-size: 15px; line-height: 1; }
    .sess:hover .x { opacity: 0.45; }
    .sess .x:hover { opacity: 1; }
    #foot { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 11px; display: flex; justify-content: space-between; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #toolbar {
      display: flex; align-items: center; gap: 6px;
      height: 42px; padding: 0 12px; border-bottom: 1px solid var(--border);
      background: var(--panel); user-select: none; -webkit-user-select: none;
    }
    #toolbar .title { flex: 1; color: var(--fg); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #toolbar .title .sub { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 12px; }
    .tbtn {
      display: flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px;
      border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 12px;
    }
    .tbtn:hover { background: var(--panel-2); color: var(--fg); }
    .tbtn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.6; }
    #grid { position: relative; flex: 1; min-height: 0; display: flex; padding: 8px; }
    .pane {
      position: relative; flex: 1; min-width: 0; min-height: 0;
      border-radius: 9px; overflow: hidden; background: var(--bg); border: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .pane.focused { border-color: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent-dim); }
    .pane-header {
      position: relative; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
      height: 24px; padding: 0 8px; background: var(--panel); border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted); user-select: none;
    }
    .pane.focused .pane-header { color: var(--fg); }
    .pane-header .pt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .pmore { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0 4px; line-height: 1; }
    .pmore:hover { color: var(--fg); }
    .pmenu { position: absolute; top: 100%; right: 4px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 4px; z-index: 20; min-width: 130px; }
    .pmi { padding: 5px 10px; border-radius: 4px; cursor: pointer; color: var(--fg); font-size: 12px; }
    .pmi:hover { background: var(--border); }
    .prename { background: var(--panel-2); border: 1px solid var(--accent-dim); color: var(--fg); font-size: 11px; border-radius: 4px; padding: 1px 4px; flex: 1; outline: none; min-width: 0; }
    .term-host { position: relative; flex: 1 1 0; min-height: 0; padding: 6px 8px; }
    .xterm { height: 100%; }
    .divider { flex: 0 0 7px; align-self: stretch; position: relative; z-index: 2; cursor: col-resize; }
    .split.col .divider { cursor: row-resize; }
    .divider::before { content: ""; position: absolute; inset: 0; margin: auto; background: var(--border); }
    .split:not(.col) .divider::before { width: 1px; }
    .split.col .divider::before { height: 1px; }
    #palette {
      position: fixed; inset: 0; display: none;
      background: rgba(4, 10, 18, 0.55); align-items: flex-start; justify-content: center; z-index: 50;
    }
    #palette.open { display: flex; }
    .pal-box {
      margin-top: 12vh; width: 520px; max-width: 90vw;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    #pal-input {
      width: 100%; border: none; outline: none; background: transparent;
      color: var(--fg); font-size: 15px; padding: 15px 18px; border-bottom: 1px solid var(--border);
    }
    #pal-list { max-height: 320px; overflow-y: auto; padding: 6px; }
    .pal-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--fg); }
    .pal-item.sel { background: var(--panel-2); }
    .pal-item .ic { color: var(--accent); width: 16px; text-align: center; }
    .pal-item .key { margin-left: auto; color: var(--muted); font-size: 11px; }
    #settings { position: fixed; inset: 0; display: none; background: rgba(4, 10, 18, 0.55); align-items: flex-start; justify-content: center; z-index: 50; }
    #settings.open { display: flex; }
    .set-box { margin-top: 12vh; width: 420px; max-width: 90vw; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .set-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--fg); font-size: 15px; }
    .set-head .x { cursor: pointer; color: var(--muted); }
    .set-body { padding: 10px 18px 16px; }
    .set-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; color: var(--fg); font-size: 13px; }
    .set-row input[type=number], .set-row select { background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 4px 8px; width: 120px; outline: none; }
    .set-row input[type=checkbox] { width: 16px; height: 16px; }
    #findbar { position: fixed; top: 40px; right: 24px; display: none; align-items: center; gap: 4px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 6px; z-index: 40; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    #findbar.open { display: flex; }
    #find-input { background: transparent; border: none; outline: none; color: var(--fg); font-size: 12px; width: 160px; padding: 4px; }
    #findbar button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 4px; }
    #findbar button:hover { color: var(--fg); background: var(--border); }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="brand"><span class="mark"></span>Cove</div>
    <div class="side-head">Terminals <span class="add" id="side-add" title="New terminal (Cmd T)">+</span></div>
    <div id="sessions"></div>
    <div id="foot"><span id="foot-count"></span><span>Cmd K</span></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <div class="tbtn" id="tb-sidebar" title="Toggle sidebar (Cmd B)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
      </div>
      <div class="title" id="tb-title">Cove</div>
      <div class="tbtn" id="tb-split-r" title="Split right (Cmd D)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        Split
      </div>
      <div class="tbtn" id="tb-split-d" title="Split down (Cmd Shift D)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
        Stack
      </div>
      <div class="tbtn" id="tb-pal" title="Command palette (Cmd K)">Cmd K</div>
    </div>
    <div id="grid"></div>
  </div>
  <div id="palette">
    <div class="pal-box">
      <input id="pal-input" placeholder="Type a command..." autocomplete="off" spellcheck="false" />
      <div id="pal-list"></div>
    </div>
  </div>
  <div id="settings">
    <div class="set-box">
      <div class="set-head"><span>Terminal Settings</span><span class="x" id="set-close">&times;</span></div>
      <div class="set-body">
        <div class="set-row"><label for="set-fontSize">Font size</label><input type="number" id="set-fontSize" min="9" max="24" step="1" /></div>
        <div class="set-row"><label for="set-lineHeight">Line height</label><input type="number" id="set-lineHeight" min="1" max="2" step="0.05" /></div>
        <div class="set-row"><label for="set-cursorStyle">Cursor style</label><select id="set-cursorStyle"><option value="block">Block</option><option value="bar">Bar</option><option value="underline">Underline</option></select></div>
        <div class="set-row"><label for="set-cursorBlink">Cursor blink</label><input type="checkbox" id="set-cursorBlink" /></div>
        <div class="set-row"><label for="set-scrollback">Scrollback lines</label><input type="number" id="set-scrollback" min="100" max="100000" step="100" /></div>
      </div>
    </div>
  </div>
  <div id="findbar">
    <input id="find-input" placeholder="Find" autocomplete="off" spellcheck="false" />
    <button id="find-prev" title="Previous">&#8593;</button>
    <button id="find-next" title="Next">&#8595;</button>
    <button id="find-close" title="Close">&times;</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
