<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove</title>
  <style>
    :root {
      --bg: #0b1622;
      --panel: #0e1c2e;
      --panel-2: #12233a;
      --border: #1b2c42;
      --fg: #e5e9f0;
      --muted: #7c8aa0;
      --accent: #4cc2d6;
      --accent-dim: #2b6d7a;
      --cove-bg-opacity: 1;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100vh; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
    }
    #app-row { display: flex; flex: 1; min-height: 0; }
    #titlebar {
      display: flex; align-items: center; gap: 8px;
      height: 40px; flex-shrink: 0; padding: 0 10px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      user-select: none; -webkit-user-select: none;
    }
    body.window-inactive #titlebar { opacity: 0.65; }
    body.backdrop-translucent { background: rgba(11, 22, 34, 0.62); }
    body.backdrop-translucent #titlebar { background: rgba(14, 28, 46, 0.55); }
    body.backdrop-translucent #sidebar { background: rgba(14, 28, 46, 0.5); }
    #tl-zone { width: 70px; flex-shrink: 0; display: none; }
    body.platform-mac #tl-zone { display: block; }
    body.platform-mac #win-controls { display: none; }
    #wordmark { display: flex; align-items: baseline; gap: 5px; flex-shrink: 0; font-weight: 650; font-size: 13px; letter-spacing: 0.3px; color: var(--fg); }
    #wordmark-ver { font-size: 10.5px; color: var(--muted); opacity: 0; transition: opacity 0.15s; }
    #wordmark:hover #wordmark-ver { opacity: 1; }
    #tb-cluster { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .tb-find-anything { display: flex; align-items: center; gap: 6px; height: 26px; padding: 0 10px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 12px; }
    .tb-find-anything:hover { color: var(--fg); border-color: var(--accent-dim); }
    .tb-find-ic { font-size: 13px; }
    .tb-find-ph { white-space: nowrap; }
    .tb-cluster-btn { width: 28px; justify-content: center; font-size: 14px; }
    .tb-cluster-btn.tb-update { color: var(--accent); }
    #win-controls { display: flex; align-items: center; gap: 2px; flex-shrink: 0; margin-left: 4px; }
    .wc { width: 30px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 12px; }
    .wc:hover { background: var(--panel-2); color: var(--fg); }
    .wc-close:hover { background: #b3364a; color: #fff; }
    #sidebar {
      width: 232px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      user-select: none; -webkit-user-select: none;
    }
    body.sidebar-hidden #sidebar { display: none; }
    #brand {
      display: flex; align-items: center; gap: 9px;
      height: 46px; padding: 0 16px;
      font-weight: 650; font-size: 14px; letter-spacing: 0.4px;
      border-bottom: 1px solid var(--border);
    }
    #brand .mark {
      width: 12px; height: 12px; background: var(--accent);
      border-radius: 3px; transform: rotate(45deg);
      box-shadow: 0 0 10px var(--accent-dim);
    }
    .side-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 6px; color: var(--muted);
      font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .side-head .add { cursor: pointer; font-size: 15px; color: var(--muted); padding: 0 5px; border-radius: 5px; }
    .side-head .add:hover { color: var(--fg); background: var(--panel-2); }
    #sessions { overflow-y: auto; flex: 1; padding: 0 8px; }
    .sess {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 9px; margin: 1px 0; border-radius: 7px; cursor: pointer; color: var(--muted);
    }
    .sess:hover { background: var(--panel-2); color: var(--fg); }
    .sess.active { background: var(--panel-2); color: var(--fg); }
    .sess.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent-dim); }
    .sess .dot { width: 7px; height: 7px; border-radius: 50%; background: #3a4a60; flex-shrink: 0; }
    .sess .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sess .n { font-size: 11px; color: var(--muted); }
    .sess .x { opacity: 0; font-size: 15px; line-height: 1; }
    .sess:hover .x { opacity: 0.45; }
    .sess .x:hover { opacity: 1; }
    #foot { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 11px; display: flex; justify-content: space-between; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #toolbar {
      display: flex; align-items: center; gap: 6px;
      height: 42px; padding: 0 12px; border-bottom: 1px solid var(--border);
      background: var(--panel); user-select: none; -webkit-user-select: none;
    }
    body.toolbar-hidden #toolbar { display: none; }
    #tb-tiles { display: flex; align-items: center; gap: 4px; }
    .tb-tile-ic { font-size: 13px; color: var(--accent); }
    .tb-tile-lbl { font-size: 12px; }
    .tb-search { width: 170px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px; color: var(--fg); font-size: 12px; padding: 5px 9px; outline: none; }
    .tb-search:focus { border-color: var(--accent-dim); }
    .tb-search::placeholder { color: var(--muted); }
    #toolbar .title { flex: 1; color: var(--fg); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #toolbar .title .sub { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 12px; }
    .tbtn {
      display: flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px;
      border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 12px;
    }
    .tbtn:hover { background: var(--panel-2); color: var(--fg); }
    .tbtn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.6; }
    #grid { position: relative; flex: 1; min-height: 0; display: flex; padding: 8px; }
    #room-tabs {
      display: flex; align-items: center; gap: 4px;
      flex: 1; min-width: 0; height: 100%; padding: 0 8px; overflow-x: auto; overflow-y: hidden;
      background: transparent;
      user-select: none; -webkit-user-select: none; scrollbar-width: none;
    }
    #room-tabs::-webkit-scrollbar { display: none; }
    .rtab {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      height: 26px; padding: 0 10px; border-radius: 7px; cursor: pointer;
      color: var(--muted); font-size: 12px; max-width: 180px; position: relative;
      transition: background 0.12s, color 0.12s;
    }
    .rtab:hover { background: var(--panel-2); color: var(--fg); }
    .rtab.active { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--fg); }
    .rtab.active::after { content: ""; position: absolute; bottom: -1px; left: 6px; right: 6px; height: 2px; background: var(--accent); border-radius: 1px; }
    .rtab .rtab-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rtab .rtab-mini { display: flex; gap: 1px; width: 18px; height: 12px; flex-shrink: 0; }
    .rtab .rtab-mini-cell { border-radius: 1px; }
    .rtab .rtab-close { opacity: 0; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 4px; }
    .rtab:hover .rtab-close { opacity: 0.5; }
    .rtab .rtab-close:hover { opacity: 1; background: var(--bg); }
    .rtab.pinned .rtab-close { display: none; }
    .rtab-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    #room-tabs.edge-fade-left::before, #room-tabs.edge-fade-right::after {
      content: ""; position: sticky; min-width: 12px; z-index: 1; pointer-events: none; flex-shrink: 0;
    }
    #room-tabs.edge-fade-left::before { left: 0; background: linear-gradient(to right, var(--panel), transparent); margin-right: -12px; }
    #room-tabs.edge-fade-right::after { right: 0; background: linear-gradient(to left, var(--panel), transparent); margin-left: -12px; }
    #wing-switcher { display: flex; align-items: center; gap: 2px; flex-shrink: 0; margin-left: 4px; }
    .wing-btn { height: 26px; padding: 0 8px; border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .wing-btn:hover { background: var(--panel-2); color: var(--fg); }
    .wing-btn.active { color: var(--accent); }
    .wing-btn.active::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .rtab-rename-input { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--fg); font-size: 12px; padding: 0 4px; height: 20px; outline: none; max-width: 120px; }
    .rtab.dragging { opacity: 0.4; }
    .rtab.drag-over { box-shadow: inset 0 0 0 2px var(--accent); }
    .pane {
      position: relative; flex: 1; min-width: 0; min-height: 0;
      border-radius: 9px; overflow: hidden; background: color-mix(in srgb, var(--bg) calc(var(--cove-bg-opacity) * 100%), transparent); border: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .pane.focused { border-color: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent-dim); }
    .pane-header {
      position: relative; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
      height: 24px; padding: 0 8px; background: var(--panel); border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted); user-select: none;
    }
    .pane.focused .pane-header { color: var(--fg); }
    .pane-header .pt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .pmore { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0 4px; line-height: 1; }
    .pmore:hover { color: var(--fg); }
    .pmenu { position: absolute; top: 100%; right: 4px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 4px; z-index: 20; min-width: 130px; }
    .pmi { padding: 5px 10px; border-radius: 4px; cursor: pointer; color: var(--fg); font-size: 12px; }
    .pmi:hover { background: var(--border); }
    .prename { background: var(--panel-2); border: 1px solid var(--accent-dim); color: var(--fg); font-size: 11px; border-radius: 4px; padding: 1px 4px; flex: 1; outline: none; min-width: 0; }
    .term-host { position: relative; flex: 1 1 0; min-height: 0; padding: 6px 8px; }
    .xterm { height: 100%; }
    .divider { flex: 0 0 7px; align-self: stretch; position: relative; z-index: 2; cursor: col-resize; }
    .split.col .divider { cursor: row-resize; }
    .divider::before { content: ""; position: absolute; inset: 0; margin: auto; background: var(--border); }
    .split:not(.col) .divider::before { width: 1px; }
    .split.col .divider::before { height: 1px; }
    #palette {
      position: fixed; inset: 0; display: none;
      background: rgba(4, 10, 18, 0.55); align-items: flex-start; justify-content: center; z-index: 50;
    }
    #palette.open { display: flex; }
    .pal-box {
      margin-top: 12vh; width: 520px; max-width: 90vw;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    #pal-input {
      width: 100%; border: none; outline: none; background: transparent;
      color: var(--fg); font-size: 15px; padding: 15px 18px; border-bottom: 1px solid var(--border);
    }
    #pal-list { max-height: 320px; overflow-y: auto; padding: 6px; }
    .pal-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--fg); }
    .pal-item.sel { background: var(--panel-2); }
    .pal-item .ic { color: var(--accent); width: 16px; text-align: center; }
    .pal-item .key { margin-left: auto; color: var(--muted); font-size: 11px; }
    #settings { position: fixed; inset: 0; display: none; background: rgba(4, 10, 18, 0.55); align-items: flex-start; justify-content: center; z-index: 50; }
    #settings.open { display: flex; }
    .set-box { margin-top: 12vh; width: 420px; max-width: 90vw; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .set-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--fg); font-size: 15px; }
    .set-head .x { cursor: pointer; color: var(--muted); }
    .set-body { padding: 10px 18px 16px; }
    .set-tabs { display: flex; gap: 2px; padding: 0 12px; border-bottom: 1px solid var(--border); }
    .set-tab { padding: 8px 12px; cursor: pointer; color: var(--muted); font-size: 12px; border-bottom: 2px solid transparent; }
    .set-tab:hover { color: var(--fg); }
    .set-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .set-row input[type=text] { background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 4px 8px; width: 180px; outline: none; }
    .set-row label { display: flex; flex-direction: column; gap: 2px; }
    .set-row .set-desc { font-size: 10px; color: var(--muted); font-weight: 400; }
    .set-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; color: var(--fg); font-size: 13px; }
    .set-row input[type=number], .set-row select { background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 4px 8px; width: 120px; outline: none; }
    .set-row input[type=checkbox] { width: 16px; height: 16px; }
    #onboarding { position: fixed; inset: 0; display: none; background: rgba(4, 10, 18, 0.6); align-items: center; justify-content: center; z-index: 60; }
    #onboarding.open { display: flex; }
    .ob-box { width: 440px; max-width: 90vw; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .ob-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); color: var(--fg); font-size: 15px; font-weight: 600; }
    .ob-head .x { cursor: pointer; color: var(--muted); font-weight: 400; font-size: 12px; }
    .ob-progress { height: 3px; background: var(--border); }
    .ob-progress-bar { height: 100%; background: var(--accent); transition: width 0.2s; }
    .ob-body { padding: 20px; color: var(--fg); font-size: 13px; line-height: 1.6; min-height: 100px; }
    .ob-body h3 { margin: 0 0 8px; font-size: 15px; }
    .ob-body p { margin: 0 0 8px; color: var(--muted); }
    .ob-adapter-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .ob-adapter { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--fg); font-size: 13px; }
    .ob-adapter.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--panel-2)); }
    .ob-adapter .ob-adapter-name { flex: 1; }
    .ob-telemetry-toggle { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .ob-telemetry-toggle input { width: 16px; height: 16px; }
    .ob-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }
    .ob-actions button { padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .ob-prev { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .ob-next { background: var(--accent); border: none; color: #000; font-weight: 600; }
    .ob-prev:disabled { opacity: 0.4; cursor: default; }
    #findbar { position: fixed; top: 40px; right: 24px; display: none; align-items: center; gap: 4px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 6px; z-index: 40; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    #findbar.open { display: flex; }
    #find-input { background: transparent; border: none; outline: none; color: var(--fg); font-size: 12px; width: 160px; padding: 4px; }
    #findbar button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 4px; }
    #findbar button:hover { color: var(--fg); background: var(--border); }
    .leaf-wrap { display: flex; flex-direction: column; flex: 1 1 0; min-width: 0; min-height: 0; }
    .subtab-strip { display: flex; gap: 2px; padding: 3px 4px 0; background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; flex: 0 0 auto; }
    .subtab { padding: 3px 10px; font-size: 11px; color: var(--muted); background: var(--panel-2); border-radius: 5px 5px 0 0; cursor: pointer; white-space: nowrap; }
    .subtab:hover { color: var(--fg); }
    .subtab.active { color: var(--fg); background: var(--bg); }
    #launcher { position: fixed; inset: 0; display: none; background: rgba(4, 10, 18, 0.55); align-items: flex-start; justify-content: center; z-index: 50; }
    #launcher.open { display: flex; }
    .launch-box { margin-top: 16vh; width: 420px; max-width: 90vw; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .launch-title { color: var(--fg); font-size: 14px; margin-bottom: 12px; }
    .launch-tiles { display: flex; gap: 10px; flex-wrap: wrap; }
    .launch-tile { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 84px; padding: 14px 8px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; color: var(--fg); }
    .launch-tile:hover { border-color: var(--accent-dim); }
    .launch-tile .ic { font-size: 20px; color: var(--accent); }
    .launch-tile .lbl { font-size: 12px; }
    .launch-hint { color: var(--muted); font-size: 11px; margin-top: 12px; }
    body.zen-mode #sidebar { display: none; }
    body.icon-set-outline .ic { color: transparent; -webkit-text-stroke: 1px var(--accent); }
    body.icon-set-filled .ic { color: var(--accent); -webkit-text-stroke: 0; }
    body.zen-mode #toolbar { display: none; }
    body.zen-mode #grid { padding: 0; }
    body.zen-mode #notepad-sidebar { display: none; }
    body.zen-mode #room-tabs, body.zen-mode #tb-cluster { opacity: 0; pointer-events: none; }
    #notepad-sidebar {
      position: fixed; top: 0; right: 0; bottom: 0; width: 280px; z-index: 30;
      background: var(--panel); border-left: 1px solid var(--border);
      display: none; flex-direction: column; user-select: none; -webkit-user-select: none;
    }
    #notepad-sidebar.open { display: flex; }
    #notepad-sidebar.collapsed { width: 44px; }
    #notepad-sidebar.collapsed .ns-body, #notepad-sidebar.collapsed .ns-head-text { display: none; }
    .ns-head { display: flex; align-items: center; justify-content: space-between; height: 42px; padding: 0 12px; border-bottom: 1px solid var(--border); }
    .ns-head-text { font-size: 12px; font-weight: 600; color: var(--fg); text-transform: uppercase; letter-spacing: 0.5px; }
    .ns-head-actions { display: flex; gap: 4px; }
    .ns-icon-btn { cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 6px; border-radius: 5px; }
    .ns-icon-btn:hover { color: var(--fg); background: var(--panel-2); }
    .ns-body { flex: 1; overflow-y: auto; padding: 4px 0; }
    .ns-group { margin-bottom: 4px; }
    .ns-group-head { display: flex; align-items: center; gap: 6px; padding: 6px 12px; cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .ns-group-head:hover { color: var(--fg); }
    .ns-group-head .chevron { transition: transform 0.15s; font-size: 9px; }
    .ns-group.collapsed .chevron { transform: rotate(-90deg); }
    .ns-group.collapsed .ns-group-notes { display: none; }
    .ns-group-count { font-size: 10px; background: var(--panel-2); border-radius: 8px; padding: 1px 6px; color: var(--muted); }
    .ns-group-notes { padding: 0 4px; }
    .ns-note { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 12px; }
    .ns-note:hover { background: var(--panel-2); color: var(--fg); }
    .ns-note.selected { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--fg); }
    .ns-note-icon { font-size: 13px; flex-shrink: 0; }
    .ns-note-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ns-empty { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 12px; }
    .ns-empty-action { color: var(--accent); cursor: pointer; margin-top: 8px; }
    .ns-empty-action:hover { text-decoration: underline; }
    #perf-hud {
      position: fixed; top: 48px; right: 12px; z-index: 70; display: none;
      min-width: 120px; padding: 8px 10px; border-radius: 8px;
      background: rgba(4, 10, 18, 0.82); border: 1px solid var(--border);
      color: var(--fg); font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px; pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #perf-hud.open { display: block; }
    .hud-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 1px 0; }
    .hud-row .hud-label { color: var(--muted); }
    .hud-row .hud-value { color: var(--accent); font-variant-numeric: tabular-nums; }
    .hud-caption { margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--border); color: var(--muted); font-size: 9.5px; line-height: 1.3; }
    .diag-caption { font-size: 11px; color: var(--muted); line-height: 1.5; padding: 4px 0 8px; }
    .diag-note { font-size: 11px; color: var(--muted); line-height: 1.5; padding: 6px 10px; margin: 6px 0; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; }
    .diag-input { width: 100%; min-height: 88px; resize: vertical; background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 6px 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; outline: none; }
    .diag-btn { margin-top: 8px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel-2); color: var(--fg); font-size: 12px; cursor: pointer; }
    .diag-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .diag-toggle { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel-2); color: var(--fg); font-size: 12px; cursor: pointer; min-width: 64px; }
    .diag-toggle.on { border-color: var(--accent); color: var(--accent); }
    .diag-snap { margin-top: 8px; }
    .diag-snap-card { margin-top: 8px; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; }
    .diag-snap-row { display: flex; justify-content: space-between; gap: 12px; padding: 1px 0; font-size: 11px; }
    .diag-snap-row .k { color: var(--muted); }
    .diag-snap-row .v { color: var(--fg); font-variant-numeric: tabular-nums; }
    .diag-error { color: #e5a0a8; font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="titlebar" data-webview-drag>
    <div id="tl-zone"></div>
    <div id="wordmark" data-webview-ignore>&#8779; cove<span id="wordmark-ver"></span></div>
    <div id="room-tabs" data-webview-ignore></div>
    <div id="tb-cluster" data-webview-ignore></div>
    <div id="win-controls" data-webview-ignore>
      <div class="wc" id="wc-min" data-webview-minimize title="Minimize">&#8211;</div>
      <div class="wc" id="wc-max" data-webview-maximize title="Maximize">&#9633;</div>
      <div class="wc wc-close" id="wc-close" data-webview-close title="Close">&#10005;</div>
    </div>
  </div>
  <div id="app-row">
  <div id="sidebar">
    <div id="brand"><span class="mark"></span>Cove</div>
    <div class="side-head">Terminals <span class="add" id="side-add" title="New terminal (Cmd T)">+</span></div>
    <div id="sessions"></div>
    <div id="foot"><span id="foot-count"></span><span>Cmd K</span></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <div class="tbtn" id="tb-sidebar" title="Toggle sidebar (Cmd B)" data-webview-ignore>
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
      </div>
      <div id="tb-tiles" data-webview-ignore></div>
      <div class="title" id="tb-title">Cove</div>
      <input id="tb-search" class="tb-search" placeholder="Search&#8230;" autocomplete="off" spellcheck="false" data-webview-ignore />
    </div>
    <div id="grid"></div>
  </div>
  </div>
  <div id="palette">
    <div class="pal-box">
      <input id="pal-input" placeholder="Type a command..." autocomplete="off" spellcheck="false" />
      <div id="pal-list"></div>
    </div>
  </div>
  <div id="onboarding">
    <div class="ob-box">
      <div class="ob-head">
        <span class="ob-title"></span>
        <span class="x ob-skip">Skip</span>
      </div>
      <div class="ob-progress"><div class="ob-progress-bar"></div></div>
      <div class="ob-body"></div>
      <div class="ob-actions">
        <button class="ob-prev">Back</button>
        <button class="ob-next">Next</button>
      </div>
    </div>
  </div>
  <div id="settings">
    <div class="set-box">
      <div class="set-head">
        <span>Settings</span>
        <span class="x" id="set-close">&times;</span>
      </div>
      <div class="set-tabs" id="set-tabs"></div>
      <div class="set-body" id="set-body"></div>
    </div>
  </div>
  <div id="findbar">
    <input id="find-input" placeholder="Find" autocomplete="off" spellcheck="false" />
    <button id="find-prev" title="Previous">&#8593;</button>
    <button id="find-next" title="Next">&#8595;</button>
    <button id="find-close" title="Close">&times;</button>
  </div>
  <div id="launcher">
    <div class="launch-box">
      <div class="launch-title">Open a pane</div>
      <div class="launch-tiles">
        <div class="launch-tile" id="launch-term"><span class="ic">&#9646;</span><span class="lbl">Terminal</span></div>
        <div class="launch-tiles" id="launch-agents"></div>
      </div>
      <div class="launch-hint">More pane types arrive in later milestones.</div>
    </div>
  </div>
  <div id="notepad-sidebar">
    <div class="ns-head">
      <span class="ns-head-text">Notes</span>
      <div class="ns-head-actions">
        <span class="ns-icon-btn" id="ns-new" title="New note">+</span>
        <span class="ns-icon-btn" id="ns-collapse" title="Collapse">&#8249;</span>
        <span class="ns-icon-btn" id="ns-close" title="Close">&times;</span>
      </div>
    </div>
    <div class="ns-body" id="ns-body"></div>
  </div>
  <div id="perf-hud" data-webview-ignore></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
