<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cove</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --panel: #181825;
      --panel-2: #313244;
      --border: #45475a;
      --fg: #cdd6f4;
      --muted: #a6adc8;
      --accent: #cba6f7;
      --accent-dim: #6c5b8e;
      --cove-bg-opacity: 1;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100vh; overflow: hidden; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: var(--panel-2); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); background-clip: padding-box; }
    ::-webkit-scrollbar-track, ::-webkit-scrollbar-corner { background: transparent; }
    select {
      -webkit-appearance: none; appearance: none;
      background-color: var(--panel-2); color: var(--fg);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 5px 26px 5px 10px; font-size: 12px; font-family: inherit; cursor: pointer; outline: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a6adc8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9.5 12 15.5 18 9.5'/></svg>");
      background-repeat: no-repeat; background-position: right 8px center; background-size: 12px;
    }
    select:hover { border-color: var(--accent-dim); }
    select:focus { border-color: var(--accent); }
    input[type="checkbox"] {
      -webkit-appearance: none; appearance: none;
      width: 15px; height: 15px; border-radius: 4px; cursor: pointer;
      background: var(--panel-2); border: 1px solid var(--border); position: relative; vertical-align: middle;
    }
    input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
    input[type="checkbox"]:checked::after {
      content: ""; position: absolute; left: 4.5px; top: 1.5px; width: 4px; height: 8px;
      border: solid #11111b; border-width: 0 1.8px 1.8px 0; transform: rotate(45deg);
    }
    body {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
    }
    #app-row { display: flex; flex: 1; min-height: 0; }
    #titlebar {
      display: flex; align-items: center; gap: 8px;
      height: 48px; flex-shrink: 0; padding: 0 10px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      user-select: none; -webkit-user-select: none;
    }
    body.window-inactive #titlebar { opacity: 0.65; }
    body.backdrop-translucent { background: rgba(30, 30, 46, 0.62); }
    body.backdrop-translucent #titlebar { background: rgba(17, 17, 27, 0.55); }
    body.backdrop-translucent #sidebar { background: rgba(24, 24, 37, 0.5); }
    #tl-zone { width: var(--ryn-titlebar-inset-left, 70px); flex-shrink: 0; display: none; }
    body.platform-mac #tl-zone { display: block; }
    body.platform-mac #win-controls { display: none; }
    #wordmark { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    #wordmark-img { height: 17px; width: auto; display: block; cursor: pointer; -webkit-user-drag: none; user-select: none; }
    #wordmark-ver { font-size: 10.5px; color: var(--muted); opacity: 0; transition: opacity 0.15s; }
    #wordmark:hover #wordmark-ver { opacity: 1; }
    #tb-cluster { display: flex; align-items: center; justify-content: center; gap: 4px; flex: 1; min-width: 0; }
    #tb-right { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .tb-find-anything { display: flex; align-items: center; gap: 7px; height: 30px; padding: 0 12px; border-radius: 9px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 12.5px; width: min(560px, 72%); min-width: 0; }
    .tb-find-ph { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tb-cluster-btn svg { width: 18px; height: 18px; display: block; }
    .tb-find-anything:hover { color: var(--fg); border-color: var(--accent-dim); }
    .tb-find-ic { font-size: 13px; line-height: 0; }
    .tb-find-ic svg { width: 13px; height: 13px; display: block; }
    .tb-find-ph { white-space: nowrap; }
    .tb-cluster-btn { width: 32px; height: 30px; justify-content: center; font-size: 14px; border-radius: 8px; }
    #tb-zoom-label { min-width: 40px; text-align: center; font-size: 12px; color: var(--muted); cursor: pointer; padding: 6px 2px; border-radius: 7px; font-variant-numeric: tabular-nums; }
    #tb-zoom-label:hover { color: var(--fg); background: var(--panel-2); }
    .tb-cluster-btn.tb-update { color: var(--accent); }
    #win-controls { display: flex; align-items: center; gap: 2px; flex-shrink: 0; margin-left: 4px; }
    .wc { width: 30px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 12px; }
    .wc:hover { background: var(--panel-2); color: var(--fg); }
    .wc-close:hover { background: #b3364a; color: #fff; }
    .dual-sidebar { display: flex; flex-shrink: 0; background: var(--panel); user-select: none; -webkit-user-select: none; }
    #rooms-row, #titlebar { user-select: none; -webkit-user-select: none; }
    .rtab.pane-drop-target { box-shadow: inset 0 0 0 2px var(--accent); }
    .dual-sidebar.side-left { border-right: 1px solid var(--border); }
    .dual-sidebar.side-right { border-left: 1px solid var(--border); }
    .dual-sidebar.side-right.collapsed { border-left: none; }
    .sb-rail {
      width: 44px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 8px 0; background: var(--panel);
    }
    .side-left .sb-rail { border-right: 1px solid var(--border); order: 0; }
    .side-right .sb-rail { border-left: 1px solid var(--border); order: 2; }
    .sb-mode {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 15px;
    }
    .sb-mode svg { width: 17px; height: 17px; display: block; }
    .sb-act svg { width: 14px; height: 14px; display: block; }
    .sb-mode:hover { color: var(--fg); background: var(--panel-2); }
    .sb-mode.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 16%, transparent); }
    .sb-mode.stub { opacity: 0.55; }
    .sb-content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; order: 1; }
    .dual-sidebar.collapsed .sb-content, .dual-sidebar.collapsed .sb-resize { display: none; }
    .sb-reopen { display: none; }
    .dual-sidebar.side-right.collapsed .sb-reopen {
      display: flex; align-items: flex-start; justify-content: center; padding-top: 12px;
      width: 26px; cursor: pointer; color: var(--muted);
    }
    .sb-reopen:hover { color: var(--fg); background: var(--panel-2); }
    .sb-reopen svg { width: 15px; height: 15px; }
    .sb-resize { width: 5px; flex-shrink: 0; cursor: col-resize; position: relative; }
    .side-left .sb-resize { order: 3; }
    .side-right .sb-resize { order: 0; }
    .sb-resize::before { content: ""; position: absolute; inset: 0; margin: auto; width: 1px; background: transparent; }
    .sb-resize:hover::before, .sb-resize.dragging::before { background: var(--accent-dim); width: 2px; }
    .sb-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 14px 7px; color: var(--muted);
      font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .sb-head .sb-head-actions { display: flex; gap: 2px; }
    .sb-head .sb-act { cursor: pointer; font-size: 14px; color: var(--muted); padding: 0 5px; border-radius: 5px; }
    .sb-head .sb-act:hover { color: var(--fg); background: var(--panel-2); }
    .sb-list { overflow-y: auto; flex: 1; padding: 0 8px 8px; }
    .sb-empty { padding: 28px 18px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .tree-row {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; margin: 1px 0; border-radius: 7px; cursor: pointer; color: var(--muted);
      font-size: 12px; white-space: nowrap;
    }
    .tree-row:hover { background: var(--panel-2); color: var(--fg); }
    .tree-row.active { color: var(--fg); }
    .tree-row.kind-workspace { font-weight: 650; color: var(--fg); text-transform: none; }
    .tree-row .tw-chevron { width: 12px; flex-shrink: 0; font-size: 9px; text-align: center; transition: transform 0.15s; }
    .tree-row.collapsed .tw-chevron { transform: rotate(-90deg); }
    .tree-row .tw-spacer { flex-shrink: 0; }
    .tree-row .tw-dot { width: 6px; height: 6px; border-radius: 50%; background: #45475a; flex-shrink: 0; }
    .tree-row .tw-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tree-row .tw-count { font-size: 10px; color: var(--muted); }
    .ws-card-scroll { display: flex; flex-direction: column; gap: 8px; padding-top: 2px; min-height: 0; }
    .ws-card-scroll > .ws-card { flex-shrink: 0; }
    .ws-card {
      border-radius: 11px; overflow: hidden;
      background: color-mix(in srgb, var(--ws-accent) 3%, var(--panel-2));
      border: 1px solid color-mix(in srgb, var(--ws-accent) 14%, transparent);
      border-left: 3px solid color-mix(in srgb, var(--ws-accent) 35%, transparent);
    }
    .ws-card-active {
      background: color-mix(in srgb, var(--ws-accent) 9%, var(--panel-2));
      border-color: color-mix(in srgb, var(--ws-accent) 38%, transparent);
      border-left: 3px solid var(--ws-accent);
    }
    .ws-card-head { display: flex; align-items: center; gap: 9px; padding: 10px 11px; cursor: pointer; }
    .ws-card-head:hover { background: color-mix(in srgb, var(--ws-accent) 10%, transparent); }
    .ws-card-swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--ws-accent); flex-shrink: 0; }
    .ws-card-swatch.has-glyph { width: auto; height: auto; background: transparent; border-radius: 0; font-size: 14px; line-height: 1; }
    .ws-icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
    .ws-icon-cell { display: flex; align-items: center; justify-content: center; width: 100%; aspect-ratio: 1; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; font-size: 16px; line-height: 1; cursor: pointer; padding: 0; color: var(--fg); }
    .ws-icon-cell:hover { border-color: var(--accent); }
    .ws-icon-cell.sel { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 45%, transparent); }
    .ws-icon-none-dot { width: 10px; height: 10px; border-radius: 3px; background: var(--accent); }
    .ws-icon-popover { position: fixed; z-index: 60; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px; box-shadow: 0 18px 44px rgba(0,0,0,0.5); width: 232px; }
    .ws-card-titles { display: flex; flex-direction: column; min-width: 0; flex: 1; }
    .ws-card-name { font-weight: 650; font-size: 13px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ws-card-dir { font-size: 10.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ws-name-row { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .ws-branch { color: var(--muted); font-size: 10.5px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; }
    .ws-scm-chip { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; font-size: 10.5px; font-variant-numeric: tabular-nums; }
    .ws-scm-chip .scm-ahead { color: #a6e3a1; }
    .ws-scm-chip .scm-behind { color: #f38ba8; }
    .ws-scm-chip .scm-dirty { color: #f9e2af; }
    .ws-card-body { padding: 2px 6px 8px; }
    .ws-card.drag-over { outline: 1.5px dashed var(--accent); outline-offset: -2px; }
    .pane-card {
      display: flex; flex-direction: column; gap: 3px; margin: 3px 0 3px 6px;
      padding: 7px 9px; border-radius: 8px; cursor: pointer;
      background: var(--panel-2);
      border: 1px solid var(--border);
    }
    .pane-card:hover { border-color: color-mix(in srgb, var(--ws-accent) 45%, var(--border)); }
    .pane-card-title { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--fg); min-width: 0; }
    .pane-card-title .pc-ic { flex-shrink: 0; line-height: 0; color: var(--ws-accent); opacity: 0.9; }
    .pane-card-title .pc-ic svg { width: 13px; height: 13px; display: block; }
    .pane-card-title .pc-title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pane-card-meta { display: flex; align-items: center; gap: 6px; padding-left: 20px; font-size: 10.5px; color: var(--muted); white-space: nowrap; overflow: hidden; }
    .pane-card-meta .pc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pane-card.state-needs-input .pc-dot { animation: ag-pulse 1.4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { .pane-card-meta .pc-dot { animation: none !important; } }
    .ws-files-head {
      display: flex; align-items: center; gap: 6px; margin-top: 8px; padding: 4px 8px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.9px; text-transform: uppercase;
      color: var(--muted); cursor: pointer; border-radius: 6px;
    }
    .ws-files-head:hover { color: var(--fg); background: var(--panel-2); }
    .ws-files-head .tw-chevron { width: 12px; font-size: 9px; text-align: center; }
    .fs-row {
      display: flex; align-items: center; gap: 6px; padding: 3px 8px; margin: 0.5px 0;
      border-radius: 6px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap;
    }
    .fs-row:hover { background: var(--panel-2); color: var(--fg); }
    .fs-row .tw-chevron { width: 12px; flex-shrink: 0; font-size: 9px; text-align: center; }
    .fs-ic { flex-shrink: 0; line-height: 0; opacity: 0.8; }
    .fs-ic svg { width: 13px; height: 13px; display: block; }
    .fs-row.fs-dir .fs-ic { color: var(--ws-accent); }
    .fs-row .tw-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .fs-row.fs-note { color: color-mix(in srgb, var(--muted) 60%, transparent); cursor: default; font-style: italic; }
    .fs-row.fs-note:hover { background: none; color: color-mix(in srgb, var(--muted) 60%, transparent); }
    .ws-card:not(.ws-card-active):hover { background: color-mix(in srgb, var(--ws-accent) 8%, var(--panel-2)); }
    .agent-row {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 9px; margin: 1px 0; border-radius: 7px; cursor: pointer;
    }
    .agent-row:hover { background: var(--panel-2); }
    .agent-row .ag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .agent-row.state-needs-input .ag-dot { animation: ag-pulse 1.4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { .agent-row .ag-dot { animation: none !important; } }
    @keyframes ag-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .agent-row .ag-body { flex: 1; min-width: 0; }
    .agent-row .ag-name { color: var(--fg); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .agent-row .ag-meta { color: var(--muted); font-size: 10.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-group-head { padding: 12px 10px 4px; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
    #rooms-row { flex-shrink: 0; display: flex; align-items: stretch; height: 40px; padding: 5px 8px; background: var(--panel); border-bottom: 1px solid var(--border); }
    #rooms-row #room-tabs { height: 100%; padding: 0 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
    .rtab-glyph { flex-shrink: 0; opacity: 0.85; line-height: 0; }
    .rtab-glyph svg { width: 13px; height: 13px; display: block; }
    .rbox-ctl { display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 26px; height: 22px; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 14px; }
    .rbox-ctl svg { width: 14px; height: 14px; display: block; }
    .rbox-ctl:hover { background: var(--panel-2); color: var(--fg); }
    .rbox-home { margin-right: 2px; }
    .ctx-menu { position: fixed; z-index: 100; min-width: 168px; padding: 5px; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; box-shadow: 0 12px 32px rgba(0,0,0,0.45); user-select: none; -webkit-user-select: none; }
    .ctx-item { display: flex; align-items: center; padding: 6px 10px; border-radius: 6px; color: var(--fg); font-size: 12px; cursor: pointer; white-space: nowrap; }
    .ctx-item.sel { background: var(--panel-2); }
    .ctx-item.danger { color: #f38ba8; }
    .ctx-item.disabled { color: var(--muted); opacity: 0.5; cursor: default; }
    .ctx-sep { height: 1px; margin: 4px 6px; background: var(--border); }
    #foot { display: none; }
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .tbtn {
      display: flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px;
      border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 12px;
    }
    .tbtn:hover { background: var(--panel-2); color: var(--fg); }
    .tbtn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.6; }
    #grid { position: relative; flex: 1; min-height: 0; display: flex; padding: 8px; }
    #room-tabs {
      display: flex; align-items: center; gap: 4px;
      flex: 1; min-width: 0; height: 100%; padding: 0 8px; overflow-x: auto; overflow-y: hidden;
      background: transparent;
      user-select: none; -webkit-user-select: none; scrollbar-width: none;
    }
    #room-tabs::-webkit-scrollbar { display: none; }
    .rtab {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      height: 26px; padding: 0 10px; border-radius: 7px; cursor: pointer;
      color: var(--muted); font-size: 12px; max-width: 180px; position: relative;
      transition: background 0.12s, color 0.12s;
    }
    .rtab:hover { background: var(--panel-2); color: var(--fg); }
    .rtab.active { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--fg); }
    .rtab.active::after { content: ""; position: absolute; bottom: -1px; left: 6px; right: 6px; height: 2px; background: var(--accent); border-radius: 1px; }
    .rtab .rtab-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rtab .rtab-mini { display: flex; gap: 1px; width: 18px; height: 12px; flex-shrink: 0; }
    .rtab .rtab-mini-cell { border-radius: 1px; }
    .rtab .rtab-close { opacity: 0; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 4px; }
    .rtab:hover .rtab-close { opacity: 0.5; }
    .rtab .rtab-close:hover { opacity: 1; background: var(--bg); }
    .rtab.pinned .rtab-close { display: none; }
    .rtab-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    #room-tabs.edge-fade-left::before, #room-tabs.edge-fade-right::after {
      content: ""; position: sticky; min-width: 12px; z-index: 1; pointer-events: none; flex-shrink: 0;
    }
    #room-tabs.edge-fade-left::before { left: 0; background: linear-gradient(to right, var(--panel), transparent); margin-right: -12px; }
    #room-tabs.edge-fade-right::after { right: 0; background: linear-gradient(to left, var(--panel), transparent); margin-left: -12px; }
    #wing-switcher { display: flex; align-items: center; gap: 2px; flex-shrink: 0; margin-left: 4px; }
    .wing-btn { height: 26px; padding: 0 8px; border-radius: 7px; cursor: pointer; color: var(--muted); font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .wing-btn:hover { background: var(--panel-2); color: var(--fg); }
    .wing-btn.active { color: var(--accent); }
    .wing-btn.active::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .rtab-rename-input { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; color: var(--fg); font-size: 12px; padding: 0 4px; height: 20px; outline: none; max-width: 120px; }
    .rtab.dragging { opacity: 0.4; }
    .rtab.drag-over { box-shadow: inset 0 0 0 2px var(--accent); }
    .pane {
      position: relative; flex: 1; min-width: 0; min-height: 0;
      border-radius: 9px; overflow: hidden; background: color-mix(in srgb, var(--bg) calc(var(--cove-bg-opacity) * 100%), transparent); border: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .pane.focused { border-color: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent-dim); }
    #inspect-overlay { position: fixed; inset: 0; z-index: 90; cursor: crosshair; }
    .inspect-highlight { position: fixed; pointer-events: none; z-index: 91; border: 1.5px solid #f9e2af; background: rgba(249, 226, 175, 0.12); border-radius: 4px; }

    .cl-resume-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; z-index: 60; flex-direction: column; gap: 1px; min-width: 240px; max-width: 340px; padding: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; max-height: 220px; overflow-y: auto; box-shadow: 0 14px 40px rgba(0,0,0,0.46); }
    .cl-resume-dd.open .cl-resume-menu { display: flex; }
    .cl-session-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cl-recent-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 11.5px; color: var(--fg); cursor: pointer; transition: background 0.1s; }
    .cl-recent-row:hover { background: color-mix(in srgb, var(--card-accent, var(--accent)) 14%, transparent); }
    .cl-recent-cwd { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cl-recent-when { color: var(--muted); font-size: 10px; flex-shrink: 0; }
    .cl-tool-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .cl-tool { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; width: 88px; height: 82px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; color: var(--fg); transition: border-color 0.14s, transform 0.12s, background 0.14s; }
    .cl-tool:hover { border-color: color-mix(in srgb, var(--tool-accent, var(--accent)) 55%, var(--border)); transform: translateY(-2px); background: color-mix(in srgb, var(--tool-accent, var(--accent)) 6%, var(--panel)); }
    .cl-tool.selected { border-color: var(--tool-accent, var(--accent)); box-shadow: inset 0 0 0 1px var(--tool-accent, var(--accent)), 0 8px 22px -14px var(--tool-accent, var(--accent)); }
    .cl-tool-ic { line-height: 0; }
    .cl-tool-ic svg { width: 21px; height: 21px; display: block; }
    .cl-tool-lbl { font-size: 10.5px; color: var(--muted); text-align: center; }
    .cl-tool.selected .cl-tool-lbl { color: var(--fg); }
    .cl-tool-key { position: absolute; top: 6px; left: 7px; font-size: 9px; font-weight: 700; color: var(--muted); background: color-mix(in srgb, var(--panel-2) 80%, transparent); border-radius: 4px; min-width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; padding: 0 3px; }
    .cl-tool.selected .cl-tool-key { color: #11111b; background: var(--tool-accent, var(--accent)); }
    .cl-tool.selected .cl-tool-key { color: var(--tool-accent, var(--accent)); }
    #toast-host { position: fixed; bottom: 16px; right: 16px; z-index: 1200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { pointer-events: auto; cursor: pointer; min-width: 220px; max-width: 340px; padding: 10px 13px; border-radius: 10px; background: var(--panel); border: 1px solid var(--border); box-shadow: 0 12px 32px rgba(0,0,0,0.45); border-left: 3px solid var(--accent); opacity: 0; transform: translateX(16px); transition: opacity 0.2s ease, transform 0.2s ease; }
    .toast.in { opacity: 1; transform: translateX(0); }
    .toast.leaving { opacity: 0; transform: translateX(16px); }
    .toast-title { font-size: 12.5px; font-weight: 650; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .toast-body { margin-top: 3px; font-size: 11.5px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    body.zen-mode .dual-sidebar { display: none; }
    body.icon-set-outline .ic { color: transparent; -webkit-text-stroke: 1px var(--accent); }
    body.icon-set-filled .ic { color: var(--accent); -webkit-text-stroke: 0; }
    body.zen-mode #grid { padding: 0; }
    body.zen-mode #rooms-row { display: none; }
    body.zen-mode #tb-cluster { opacity: 0; pointer-events: none; }
    .ns-body { flex: 1; overflow-y: auto; padding: 4px 0; }
    .ns-group { margin-bottom: 4px; }
    .ns-group-head { display: flex; align-items: center; gap: 6px; padding: 6px 12px; cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .ns-group-head:hover { color: var(--fg); }
    .ns-group-head .chevron { transition: transform 0.15s; font-size: 9px; }
    .ns-group.collapsed .chevron { transform: rotate(-90deg); }
    .ns-group.collapsed .ns-group-notes { display: none; }
    .ns-group-count { font-size: 10px; background: var(--panel-2); border-radius: 8px; padding: 1px 6px; color: var(--muted); }
    .ns-group-notes { padding: 0 4px; }
    .ns-note { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 12px; }
    .ns-note:hover { background: var(--panel-2); color: var(--fg); }
    .ns-note.selected { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--fg); }
    .ns-note-icon { font-size: 13px; flex-shrink: 0; }
    .ns-note-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ns-empty { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 12px; }
    .ns-empty-action { color: var(--accent); cursor: pointer; margin-top: 8px; }
    .ns-empty-action:hover { text-decoration: underline; }
    #perf-hud {
      position: fixed; top: 48px; right: 12px; z-index: 70; display: none;
      min-width: 120px; padding: 8px 10px; border-radius: 8px;
      background: rgba(17, 17, 27, 0.82); border: 1px solid var(--border);
      color: var(--fg); font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px; pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #perf-hud.open { display: block; }
    .hud-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 1px 0; }
    .hud-row .hud-label { color: var(--muted); }
    .hud-row .hud-value { color: var(--accent); font-variant-numeric: tabular-nums; }
    .hud-caption { margin-top: 5px; padding-top: 5px; border-top: 1px solid var(--border); color: var(--muted); font-size: 9.5px; line-height: 1.3; }
    .diag-caption { font-size: 11px; color: var(--muted); line-height: 1.5; padding: 4px 0 8px; }
    .diag-note { font-size: 11px; color: var(--muted); line-height: 1.5; padding: 6px 10px; margin: 6px 0; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; }
    .diag-input { width: 100%; min-height: 88px; resize: vertical; background: var(--panel-2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 6px 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; outline: none; }
    .diag-btn { margin-top: 8px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel-2); color: var(--fg); font-size: 12px; cursor: pointer; }
    .diag-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .diag-toggle { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel-2); color: var(--fg); font-size: 12px; cursor: pointer; min-width: 64px; }
    .diag-toggle.on { border-color: var(--accent); color: var(--accent); }
    .diag-snap { margin-top: 8px; }
    .diag-snap-card { margin-top: 8px; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; }
    .diag-snap-row { display: flex; justify-content: space-between; gap: 12px; padding: 1px 0; font-size: 11px; }
    .diag-snap-row .k { color: var(--muted); }
    .diag-snap-row .v { color: var(--fg); font-variant-numeric: tabular-nums; }
    .diag-error { color: #f38ba8; font-size: 11px; margin-top: 6px; }

    .pane { border-radius: 11px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.14); }
    .pane.focused { border-color: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent-dim), 0 3px 10px rgba(0, 0, 0, 0.18); }
    .pane-header { height: 26px; background: color-mix(in srgb, var(--panel) 80%, var(--panel-2)); }
    .agent-row {
      background: color-mix(in srgb, var(--panel-2) 38%, transparent);
      border: 1px solid transparent; border-radius: 11px;
      margin: 3px 0; padding: 9px 11px;
      transition: background 0.12s;
    }
    .agent-row:hover { background: var(--panel-2); }
    .agent-row .ag-name { font-weight: 600; }
    .tree-row { border-radius: 8px; transition: background 0.1s, color 0.1s; }
    .tree-row.active { box-shadow: none; }
    .tree-row.active .tw-dot { box-shadow: none; }
    .rtab { border: 1px solid transparent; }
    .rtab:hover { background: color-mix(in srgb, var(--panel-2) 70%, transparent); color: var(--fg); }
    .rtab.active {
      background: var(--panel-2); color: var(--fg);
      border-color: var(--border);
    }
    #room-tabs { gap: 5px; }
    #rooms-row { height: 42px; padding: 6px 10px; }
    #rooms-row #room-tabs { border-radius: 11px; background: color-mix(in srgb, var(--panel) 55%, var(--panel-2)); }
    #grid { padding: 10px; }
    .cl-card, .cl-tool { background: color-mix(in srgb, var(--panel-2) 30%, var(--panel)); box-shadow: 0 6px 18px -8px rgba(0, 0, 0, 0.34); }
    .ctx-menu { border-radius: 11px; padding: 6px; background: color-mix(in srgb, var(--panel) 88%, var(--panel-2)); }
    .ctx-item { border-radius: 7px; padding: 7px 11px; }
    .box-launcher { gap: 16px; }
    .tb-find-anything { transition: border-color 0.12s, color 0.12s; }
    .sb-head { padding-top: 15px; }
  </style>
</head>
<body>
  <div id="titlebar" data-webview-drag>
    <div id="tl-zone"></div>
    <div id="wordmark"><img id="wordmark-img" alt="cove" data-webview-ignore /><span id="wordmark-ver"></span></div>
    <div id="tb-cluster" data-webview-ignore></div>
    <div id="tb-right" data-webview-ignore></div>
    <div id="win-controls" data-webview-ignore>
      <div class="wc" id="wc-min" data-webview-minimize title="Minimize">&#8211;</div>
      <div class="wc" id="wc-max" data-webview-maximize title="Maximize">&#9633;</div>
      <div class="wc wc-close" id="wc-close" data-webview-close title="Close">&#10005;</div>
    </div>
  </div>
  <div id="app-row">
  <aside id="left-sidebar" class="dual-sidebar side-left" data-webview-ignore>
    <div class="sb-rail" id="left-rail"></div>
    <div class="sb-content" id="left-content"></div>
    <div class="sb-resize" id="left-resize" title="Resize"></div>
  </aside>
  <div id="main">
    <div id="rooms-row"><div id="room-tabs"></div></div>
    <div id="grid"></div>
  </div>
  </div>
  <div id="palette">
    <div class="pal-box">
      <input id="pal-input" placeholder="Type a command..." autocomplete="off" spellcheck="false" />
      <div id="pal-list"></div>
    </div>
  </div>
  <div id="onboarding">
    <div class="ob-box">
      <div class="ob-head">
        <span class="ob-title"></span>
        <span class="x ob-skip">Skip</span>
      </div>
      <div class="ob-progress"><div class="ob-progress-bar"></div></div>
      <div class="ob-body"></div>
      <div class="ob-actions">
        <button class="ob-prev">Back</button>
        <button class="ob-next">Next</button>
      </div>
    </div>
  </div>
  <div id="settings">
    <div class="set-box">
      <div class="set-head">
        <span>Settings</span>
        <span class="x" id="set-close">&times;</span>
      </div>
      <div class="set-tabs" id="set-tabs"></div>
      <div class="set-body" id="set-body"></div>
    </div>
  </div>
  <div id="ws-create">
    <div class="set-box">
      <div class="set-head">
        <span>New workspace</span>
        <span class="x" id="wsc-close">&times;</span>
      </div>
      <div class="set-body">
        <div class="wsc-field">
          <label for="wsc-name">Name</label>
          <input id="wsc-name" type="text" placeholder="My project" autocomplete="off" spellcheck="false" />
        </div>
        <div class="wsc-field">
          <label for="wsc-path">Directory</label>
          <div class="wsc-path-row">
            <input id="wsc-path" type="text" placeholder="~/code/my-project" autocomplete="off" spellcheck="false" />
            <button id="wsc-browse" type="button">Browse…</button>
          </div>
          <div class="wsc-hint">Use ~ for your home directory. Created if it does not exist.</div>
        </div>
        <div class="wsc-field">
          <label>Icon</label>
          <div id="wsc-icon-grid" class="ws-icon-grid"></div>
        </div>
        <div class="wsc-error" id="wsc-error"></div>
        <div class="wsc-actions">
          <button id="wsc-create" type="button">Create</button>
        </div>
      </div>
    </div>
  </div>
  <div id="findbar">
    <input id="find-input" placeholder="Find" autocomplete="off" spellcheck="false" />
    <button id="find-prev" title="Previous">&#8593;</button>
    <button id="find-next" title="Next">&#8595;</button>
    <button id="find-close" title="Close">&times;</button>
  </div>
  <div id="launcher">
    <div class="launch-box">
      <div class="launch-title">Open a pane</div>
      <div class="launch-tiles">
        <div class="launch-tile" id="launch-term"><span class="ic">&#9646;</span><span class="lbl">Terminal</span></div>
        <div class="launch-tiles" id="launch-agents"></div>
      </div>
      <div class="launch-hint">More pane types arrive in later milestones.</div>
    </div>
  </div>
  <div id="perf-hud" data-webview-ignore></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
