name: release

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' && 'true' || 'false' }}
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: Publish CLI
        run: dotnet publish src/Cove.Cli/Cove.Cli.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true --self-contained true -o artifacts/${{ matrix.rid }}
      - name: Bundle PTY shim (unix)
        if: runner.os != 'Windows'
        run: bash native/cove_pty/build-unix.sh "artifacts/${{ matrix.rid }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cove-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}
      - uses: actions/setup-node@v4
        if: runner.os == 'macOS'
        with:
          node-version: 20
      - name: Build GUI frontend (macOS)
        if: runner.os == 'macOS'
        working-directory: src/Cove.Gui/frontend
        run: npm ci && npm run build
      - name: Bundle macOS app
        if: runner.os == 'macOS'
        run: COVE_VERSION="${GITHUB_REF_NAME#v}" bash scripts/package-macos-app.sh ${{ matrix.rid }} appdist
      - name: Upload macOS app artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: cove-macos-app
          path: appdist
      - name: Sign and notarize (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: echo "macOS signing runs here when APPLE_CERTIFICATE is configured"
      - name: Sign (Windows)
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERT == 'true'
        run: echo "Windows Authenticode signing runs here when WINDOWS_CERTIFICATE is configured"

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Package archives
        run: |
          cd dist
          for d in */; do
            name="${d%/}"
            rm -f "$d"*.pdb "$d"*.dbg "$d"covptygen
            rm -rf "$d"cove.dSYM
            find "$d" -type f \( -name cove -o -name Cove.Gui -o -name Cove \) -exec chmod +x {} + 2>/dev/null || true
            (cd "$d" && zip -r "../${name}.zip" .)
          done
          ls -la
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.zip --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes
